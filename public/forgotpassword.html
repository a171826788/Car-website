<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voyago Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="https://ik.imagekit.io/vtfcbjo5c/logo.png?updatedAt=1784212210872">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --maroon-dark: #3d0f12;
            --maroon: #5c1a1f;
            --gold: #cf9a3a;
            --gold-light: #d4a017;
            --ivory: #f7f3ec;
            --charcoal: #2b2b2b;
            --rust: #b5511f;
            --gray: #8a8a8a;
            --gray-light: #d9d4cb;
            --error: #c0392b;
            --success: #2e8b4f;
            --warn: #d97a1f;
            --info: #3a6d8c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--charcoal);
            background: #0d0605;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: clamp(16px, 4vw, 40px);
            position: relative;
            overflow-x: hidden;
            isolation: isolate;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-layer--radial {
            background: radial-gradient(ellipse 120% 90% at 25% 15%,
                    rgba(181, 81, 31, 0.35) 0%,
                    rgba(61, 15, 18, 0.18) 35%,
                    rgba(13, 6, 5, 0.9) 70%,
                    #0a0404 100%);
            animation: radialShift 14s ease-in-out infinite alternate;
        }

        @keyframes radialShift {
            0% {
                background: radial-gradient(ellipse 120% 90% at 25% 15%,
                        rgba(181, 81, 31, 0.35) 0%,
                        rgba(61, 15, 18, 0.18) 35%,
                        rgba(13, 6, 5, 0.9) 70%,
                        #0a0404 100%);
            }

            33% {
                background: radial-gradient(ellipse 130% 100% at 60% 25%,
                        rgba(207, 154, 58, 0.28) 0%,
                        rgba(92, 26, 31, 0.2) 30%,
                        rgba(13, 6, 5, 0.88) 65%,
                        #0a0303 100%);
            }

            66% {
                background: radial-gradient(ellipse 110% 95% at 70% 10%,
                        rgba(181, 81, 31, 0.3) 0%,
                        rgba(61, 15, 18, 0.15) 40%,
                        rgba(13, 6, 5, 0.92) 72%,
                        #0b0505 100%);
            }

            100% {
                background: radial-gradient(ellipse 125% 85% at 15% 30%,
                        rgba(212, 160, 23, 0.25) 0%,
                        rgba(61, 15, 18, 0.22) 32%,
                        rgba(13, 6, 5, 0.9) 68%,
                        #0a0404 100%);
            }
        }

        .bg-layer--sweep {
            background: linear-gradient(145deg,
                    rgba(92, 26, 31, 0.5) 0%,
                    rgba(13, 6, 5, 0.2) 30%,
                    rgba(181, 81, 31, 0.25) 55%,
                    rgba(13, 6, 5, 0.6) 80%,
                    #0d0605 100%);
            background-size: 250% 250%;
            animation: sweepGradient 18s ease-in-out infinite;
            mix-blend-mode: overlay;
            opacity: 0.85;
        }

        @keyframes sweepGradient {
            0% {
                background-position: 0% 0%;
            }

            25% {
                background-position: 50% 30%;
            }

            50% {
                background-position: 100% 70%;
            }

            75% {
                background-position: 40% 90%;
            }

            100% {
                background-position: 0% 0%;
            }
        }

        .bg-layer--texture {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            opacity: 0.7;
            animation: textureDrift 22s linear infinite;
        }

        @keyframes textureDrift {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 200px 200px;
            }
        }

        .bg-layer--particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle,
                    rgba(212, 160, 23, 0.7) 0%,
                    rgba(207, 154, 58, 0.25) 40%,
                    transparent 70%);
            animation: floatUp linear infinite;
            opacity: 0;
        }

        .particle:nth-child(1) {
            width: 4px;
            height: 4px;
            left: 12%;
            animation-duration: 9s;
            animation-delay: 0s;
            box-shadow: 0 0 8px 3px rgba(212, 160, 23, 0.5);
        }

        .particle:nth-child(2) {
            width: 2.5px;
            height: 2.5px;
            left: 28%;
            animation-duration: 11s;
            animation-delay: 2s;
            box-shadow: 0 0 6px 2px rgba(207, 154, 58, 0.45);
        }

        .particle:nth-child(3) {
            width: 3.5px;
            height: 3.5px;
            left: 44%;
            animation-duration: 8s;
            animation-delay: 4s;
            box-shadow: 0 0 7px 3px rgba(181, 81, 31, 0.5);
        }

        .particle:nth-child(4) {
            width: 2px;
            height: 2px;
            left: 58%;
            animation-duration: 13s;
            animation-delay: 1s;
            box-shadow: 0 0 5px 2px rgba(212, 160, 23, 0.4);
        }

        .particle:nth-child(5) {
            width: 5px;
            height: 5px;
            left: 72%;
            animation-duration: 10s;
            animation-delay: 5s;
            box-shadow: 0 0 10px 4px rgba(207, 154, 58, 0.55);
        }

        .particle:nth-child(6) {
            width: 3px;
            height: 3px;
            left: 85%;
            animation-duration: 12s;
            animation-delay: 3s;
            box-shadow: 0 0 7px 2px rgba(181, 81, 31, 0.5);
        }

        .particle:nth-child(7) {
            width: 2px;
            height: 2px;
            left: 6%;
            animation-duration: 9.5s;
            animation-delay: 6s;
            box-shadow: 0 0 5px 2px rgba(212, 160, 23, 0.4);
        }

        .particle:nth-child(8) {
            width: 4.5px;
            height: 4.5px;
            left: 35%;
            animation-duration: 11.5s;
            animation-delay: 7s;
            box-shadow: 0 0 9px 3px rgba(207, 154, 58, 0.5);
        }

        .particle:nth-child(9) {
            width: 2.8px;
            height: 2.8px;
            left: 52%;
            animation-duration: 8.5s;
            animation-delay: 2.5s;
            box-shadow: 0 0 6px 2px rgba(181, 81, 31, 0.45);
        }

        .particle:nth-child(10) {
            width: 3.2px;
            height: 3.2px;
            left: 66%;
            animation-duration: 10.5s;
            animation-delay: 4.5s;
            box-shadow: 0 0 7px 3px rgba(212, 160, 23, 0.5);
        }

        .particle:nth-child(11) {
            width: 1.8px;
            height: 1.8px;
            left: 78%;
            animation-duration: 14s;
            animation-delay: 1.5s;
            box-shadow: 0 0 4px 2px rgba(207, 154, 58, 0.35);
        }

        .particle:nth-child(12) {
            width: 3.8px;
            height: 3.8px;
            left: 20%;
            animation-duration: 9.8s;
            animation-delay: 5.5s;
            box-shadow: 0 0 8px 3px rgba(181, 81, 31, 0.5);
        }

        @keyframes floatUp {
            0% {
                bottom: -40px;
                opacity: 0;
                transform: translateX(0) scale(0.3);
            }

            15% {
                opacity: 0.9;
                transform: translateX(8px) scale(1);
            }

            35% {
                transform: translateX(-6px) scale(1.2);
            }

            55% {
                transform: translateX(4px) scale(0.9);
            }

            75% {
                opacity: 0.5;
                transform: translateX(-10px) scale(0.6);
            }

            100% {
                bottom: 105%;
                opacity: 0;
                transform: translateX(12px) scale(0.2);
            }
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            width: 900px;
            height: 900px;
            border-radius: 50%;
            border: 1.5px solid var(--rust);
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
            animation: ringPulse 8s ease-in-out infinite alternate,
                ringRotate 30s linear infinite;
            box-shadow: 0 0 0 60px rgba(181, 81, 31, 0.06),
                0 0 0 120px rgba(181, 81, 31, 0.04),
                0 0 0 200px rgba(181, 81, 31, 0.02);
        }

        body::before {
            top: -550px;
            left: -450px;
            animation-delay: 0s;
        }

        body::after {
            bottom: -550px;
            right: -450px;
            animation-delay: -4s;
            border-color: rgba(207, 154, 58, 0.6);
            box-shadow: 0 0 0 60px rgba(207, 154, 58, 0.05),
                0 0 0 120px rgba(207, 154, 58, 0.03),
                0 0 0 200px rgba(207, 154, 58, 0.015);
        }

        @keyframes ringPulse {
            0% {
                opacity: 0.08;
                transform: scale(1);
            }

            50% {
                opacity: 0.16;
                transform: scale(1.04);
            }

            100% {
                opacity: 0.09;
                transform: scale(1.01);
            }
        }

        @keyframes ringRotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .card {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
        }

        .header-panel {
            background: linear-gradient(160deg,
                    var(--maroon) 0%,
                    var(--maroon-dark) 100%);
            border-radius: 20px;
            padding: clamp(18px, 4vw, 26px) clamp(24px, 4vw, 32px) clamp(32px, 5vw, 44px);
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .header-panel::after {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: radial-gradient(ellipse at center,
                    rgba(255, 255, 255, 0.06) 0%,
                    transparent 65%);
            animation: headerShimmer 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes headerShimmer {

            0%,
            100% {
                transform: translate(-5%, -5%) rotate(0deg);
            }

            50% {
                transform: translate(5%, 8%) rotate(3deg);
            }
        }

        .badge {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #2a0709;
            display: grid;
            place-items: center;
            margin: 0 auto 10px;
            border: 1.5px solid rgba(212, 160, 23, 0.3);
            position: relative;
            z-index: 1;
            animation: badgeGlow 3s ease-in-out infinite;
        }

        @keyframes badgeGlow {

            0%,
            100% {
                box-shadow: 0 0 12px rgba(212, 160, 23, 0.2),
                    0 0 24px rgba(212, 160, 23, 0.08);
            }

            50% {
                box-shadow: 0 0 20px rgba(212, 160, 23, 0.35),
                    0 0 36px rgba(212, 160, 23, 0.14);
            }
        }

        .badge svg {
            width: 28px;
            height: 28px;
            stroke: var(--gold-light);
            fill: none;
            stroke-width: 1.8;
        }

        h1.welcome {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            font-size: clamp(24px, 5vw, 32px);
            line-height: 1.15;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        h1.welcome .gold {
            color: var(--gold-light);
            font-style: italic;
            animation: goldShimmer 2.5s ease-in-out infinite;
        }

        @keyframes goldShimmer {

            0%,
            100% {
                color: #d4a017;
            }

            50% {
                color: #e8c44a;
            }
        }

        .subhead {
            color: #e8dccd;
            font-size: clamp(13px, 2.5vw, 15px);
            opacity: 0.85;
            position: relative;
            z-index: 1;
            line-height: 1.5;
        }

        .form-panel {
            background: var(--ivory);
            border-radius: 20px;
            margin-top: -24px;
            padding: clamp(16px, 3vw, 22px) clamp(20px, 4vw, 28px);
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.55),
                0 8px 20px rgba(0, 0, 0, 0.25);
            position: relative;
            transition: box-shadow 0.4s ease;
        }

        .form-panel:hover {
            box-shadow: 0 34px 64px -18px rgba(0, 0, 0, 0.6),
                0 10px 24px rgba(0, 0, 0, 0.28),
                0 0 0 1px rgba(207, 154, 58, 0.12);
        }

        .form-panel.shake {
            animation: shake 0.45s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-5px);
            }

            80% {
                transform: translateX(5px);
            }
        }

        .success-panel {
            display: none;
            text-align: center;
            padding: clamp(8px, 2vw, 14px) 0;
        }

        .success-panel.show {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon-wrap {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #e8f5e9;
            display: grid;
            place-items: center;
            margin: 0 auto 16px;
            animation: successPop 0.5s ease;
        }

        @keyframes successPop {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            60% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-icon-wrap svg {
            width: 30px;
            height: 30px;
            stroke: var(--success);
            fill: none;
            stroke-width: 2.5;
        }

        .success-panel h2 {
            font-family: 'Playfair Display', serif;
            color: var(--maroon-dark);
            font-size: 20px;
            margin-bottom: 8px;
        }

        .success-panel p {
            color: #4d4944;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 4px;
        }

        .success-panel .email-sent-to {
            font-weight: 700;
            color: var(--maroon);
            word-break: break-all;
        }

        .success-panel .hint {
            font-size: 12px;
            color: var(--gray);
            margin-top: 6px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        form.hidden-form {
            display: none;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label.lbl {
            font-size: clamp(10.5px, 2vw, 11.5px);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #5a5651;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrap svg.left {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 14px;
            width: 18px;
            height: 18px;
            stroke: var(--gray);
            fill: none;
            stroke-width: 1.8;
        }

        .input-wrap input {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            padding: 10px 14px 10px 42px;
            border: 1px solid #e2dccf;
            border-radius: 10px;
            background: #fff;
            color: var(--charcoal);
            transition: border-color 0.15s ease, box-shadow 0.15s ease,
                background 0.15s ease;
            min-height: 40px;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px rgba(92, 26, 31, 0.12);
            background: #fefdfb;
        }

        .error-msg {
            color: var(--error);
            font-size: 12px;
            display: none;
            animation: fadeInDown 0.2s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .field.has-error .input-wrap input {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.08);
        }

        .field.has-error .error-msg {
            display: block;
        }

        .btn-reset {
            margin-top: 2px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #fff;
            background: linear-gradient(180deg, #d6a445 0%, var(--gold) 100%);
            border: 0;
            border-radius: 12px;
            padding: 10px;
            min-height: 42px;
            cursor: pointer;
            box-shadow: 0 6px 14px -4px rgba(207, 154, 58, 0.55);
            transition: transform 0.15s ease, box-shadow 0.2s ease,
                filter 0.15s ease, background 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-reset::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.15) 0%,
                    transparent 50%);
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .btn-reset:hover:not([disabled]) {
            filter: brightness(0.95);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -6px rgba(207, 154, 58, 0.6);
        }

        .btn-reset:active:not([disabled]) {
            transform: translateY(0);
            box-shadow: 0 4px 10px -4px rgba(207, 154, 58, 0.5);
        }

        .btn-reset[disabled] {
            cursor: not-allowed;
            opacity: 0.55;
            box-shadow: none;
            filter: grayscale(0.15);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .btn-reset.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .back-link {
            text-align: center;
            margin-top: 14px;
        }

        .back-link a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--maroon);
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s ease, gap 0.2s ease;
        }

        .back-link a:hover {
            color: #7a232a;
            gap: 10px;
            text-decoration: underline;
        }

        .back-link a svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            transition: transform 0.2s ease;
        }

        .back-link a:hover svg {
            transform: translateX(-3px);
        }

        .resend-link {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #4d4944;
        }

        .resend-link button {
            background: none;
            border: none;
            font-family: inherit;
            font-size: inherit;
            color: var(--maroon);
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
            transition: color 0.2s ease;
        }

        .resend-link button:hover {
            color: #7a232a;
        }

        .resend-link button[disabled] {
            color: var(--gray);
            cursor: not-allowed;
            text-decoration: none;
        }

        .resend-link .countdown {
            font-weight: 600;
            color: var(--gray);
        }

        @media (max-height: 760px) {
            .header-panel {
                padding-top: 20px;
                padding-bottom: 36px;
            }

            .badge {
                margin-bottom: 10px;
                width: 48px;
                height: 48px;
            }

            .badge svg {
                width: 24px;
                height: 24px;
            }

            h1.welcome {
                font-size: clamp(22px, 4vw, 28px);
            }

            .form-panel {
                margin-top: -28px;
            }

            form {
                gap: 11px;
            }
        }

        @media (max-width: 480px) {
            .card {
                max-width: 95vw;
            }

            body::before,
            body::after {
                width: 600px;
                height: 600px;
            }

            body::before {
                top: -400px;
                left: -350px;
            }

            body::after {
                bottom: -400px;
                right: -350px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-layer bg-layer--radial" aria-hidden="true"></div>
    <div class="bg-layer bg-layer--sweep" aria-hidden="true"></div>
    <div class="bg-layer bg-layer--texture" aria-hidden="true"></div>

    <div class="bg-layer--particles" aria-hidden="true">
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
    </div>

    <main class="card" role="main">
        <section class="header-panel" aria-labelledby="forgot-heading">
            <div class="badge" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                    <circle cx="15" cy="9" r="2.5" />
                    <path d="M12.5 9.5 2 20l1.5 1.5L5 20l1.5 1.5L8 20l1.5 1.5L11 20l4-4.5" stroke-linejoin="round" />
                </svg>
            </div>
            <h1 class="welcome" id="forgot-heading">
                Forgot <span class="gold">Password</span>
            </h1>
            <p class="subhead">
                No worries we'll help you get back in.
            </p>
        </section>

        <section class="form-panel" id="formPanel">
            <form id="forgotForm" novalidate>
                <div class="field">
                    <label class="lbl" for="email">Email Address</label>
                    <div class="input-wrap">
                        <svg class="left" viewBox="0 0 24 24">
                            <rect x="3" y="5" width="18" height="14" rx="2" />
                            <path d="M3 7l9 7 9-7" />
                        </svg>
                        <input type="email" id="email" name="email" autocomplete="email"
                            placeholder="e.g. james.clark@heritage.com" required maxlength="120" />
                    </div>
                    <p class="error-msg" id="email-error">
                        Please enter a valid email address.
                    </p>
                </div>

                <button type="submit" class="btn-reset" id="resetBtn">
                    <span class="spinner" aria-hidden="true"></span>
                    <span class="btn-label">Send Reset Link</span>
                </button>
            </form>

            <div class="success-panel" id="successPanel">
                <div class="success-icon-wrap">
                    <svg viewBox="0 0 24 24">
                        <polyline points="4 12 10 18 20 6" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <h2>Check Your Inbox</h2>
                <p>
                    We've sent a password reset link to
                    <span class="email-sent-to" id="sentEmail">—</span>
                </p>
                <p class="hint">
                    Didn't receive the email? Check your spam folder or
                    try resending.
                </p>
                <div class="resend-link">
                    <button type="button" id="resendBtn">
                        Resend link
                    </button>
                    <span class="countdown" id="countdown"></span>
                </div>
            </div>

            <p class="back-link">
                <a href="login.html">
                    <svg viewBox="0 0 24 24">
                        <polyline points="15 18 9 12 15 6" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Back to Log In
                </a>
            </p>
        </section>
    </main>

    <script>
        (function () {
            const $ = (s) => document.querySelector(s);
            const form = $('#forgotForm');
            const formPanel = $('#formPanel');
            const email = $('#email');
            const resetBtn = $('#resetBtn');
            const successPanel = $('#successPanel');
            const sentEmailSpan = $('#sentEmail');
            const resendBtn = $('#resendBtn');
            const countdownSpan = $('#countdown');

            const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            let countdownTimer = null;
            let countdownSeconds = 0;

            email.addEventListener('input', () => {
                const field = email.closest('.field');
                if (!email.value) {
                    field.classList.remove('has-error');
                    return;
                }
                if (emailRe.test(email.value.trim())) {
                    field.classList.remove('has-error');
                } else {
                    field.classList.add('has-error');
                    $('#email-error').textContent =
                        'Please enter a valid email address.';
                }
            });

            function setError(name, msg) {
                const field = document.getElementById(name).closest('.field');
                field.classList.add('has-error');
                if (msg)
                    document.getElementById(name + '-error').textContent = msg;
            }

            function clearError(name) {
                document.getElementById(name).closest('.field').classList.remove(
                    'has-error');
            }

            function startCountdown() {
                countdownSeconds = 45;
                resendBtn.disabled = true;
                updateCountdownDisplay();
                countdownTimer = setInterval(() => {
                    countdownSeconds--;
                    updateCountdownDisplay();
                    if (countdownSeconds <= 0) {
                        clearInterval(countdownTimer);
                        countdownTimer = null;
                        resendBtn.disabled = false;
                        countdownSpan.textContent = '';
                    }
                }, 1000);
            }

            function updateCountdownDisplay() {
                if (countdownSeconds > 0) {
                    countdownSpan.textContent =
                        '(wait ' + countdownSeconds + 's)';
                } else {
                    countdownSpan.textContent = '';
                }
            }

            function showSuccess(emailValue) {
                sentEmailSpan.textContent = emailValue;
                form.classList.add('hidden-form');
                successPanel.classList.add('show');
                startCountdown();
            }

            function showForm() {
                form.classList.remove('hidden-form');
                successPanel.classList.remove('show');
                if (countdownTimer) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                }
                resendBtn.disabled = false;
                countdownSpan.textContent = '';
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let ok = true;

                if (!emailRe.test(email.value.trim())) {
                    setError('email', 'Please enter a valid email address.');
                    ok = false;
                }

                if (!ok) {
                    formPanel.classList.remove('shake');
                    void formPanel.offsetWidth;
                    formPanel.classList.add('shake');
                    return;
                }

                resetBtn.classList.add('loading');
                resetBtn.disabled = true;
                resetBtn.querySelector('.btn-label').textContent =
                    'Sending…';

                setTimeout(() => {
                    resetBtn.classList.remove('loading');
                    resetBtn.disabled = false;
                    resetBtn.querySelector('.btn-label').textContent =
                        'Send Reset Link';
                    showSuccess(email.value.trim());
                }, 1400);
            });

            resendBtn.addEventListener('click', () => {
                if (resendBtn.disabled) return;
                resendBtn.disabled = true;
                resendBtn.textContent = 'Resending…';

                setTimeout(() => {
                    resendBtn.textContent = 'Resend link';
                    startCountdown();
                }, 1200);
            });

            window.addEventListener('pageshow', () => {
                if (successPanel.classList.contains('show')) {
                }
            });
        })();
    </script>
</body>

</html>
